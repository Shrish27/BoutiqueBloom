<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoutiqueBloom | Sign Up</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/png" sizes="64x64" href="images/favicon.png?v=2">
    <link rel="shortcut icon" type="image/png" href="images/favicon.png?v=2">
  </head>
  <body class="auth-page">
    <div id="page-loader">
  <div class="loader-spinner"></div>
</div>
    <header class="navbar">
      <div class="container navbar-inner">
        <a href="index.html" class="brand">BoutiqueBloom</a>
        <nav aria-label="Primary">
          <a href="index.html#features">Features</a>
            <a href="index.html#how-it-works">How It Works</a>
            <a href="index.html#testimonials">Testimonials</a>
            <a href="contact.html">Contact</a>
        </nav>
        <a href="login.html" class="btn btn-accent">Login</a>
         
      </div>
    </header>

    <main class="section">
      <div class="container auth-layout">
        <section class="auth-copy" aria-labelledby="signup-copy-heading">
          <p>Let’s Get Started</p>
          <h1 id="signup-copy-heading">Create your boutique marketing workspace.</h1>
          <p>
            Set up your account to plan campaigns, organize content, and grow your local
            brand with clarity.
          </p>
        </section>

        <section class="card auth-card" aria-labelledby="signup-title">
          <h2 id="signup-title">Create Account</h2>
          <form id="signup-form" class="auth-form" action="#" method="post" data-supabase-signup>
            <div class="form-row">
              <label for="full-name">Full Name</label>
              <input id="full-name" name="fullName" type="text" autocomplete="name" required />
            </div>

            <div class="form-row">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>

            <div class="form-row">
              <label for="phone">Phone <span class="optional-text">(optional)</span></label>
              <input
                id="phone"
                name="phone"
                type="tel"
                autocomplete="tel"
                inputmode="tel"
              />
            </div>

            <div class="form-row">
              <label for="signup-role">Account Type</label>
              <select id="signup-role" name="role" data-role-control required>
                <option value="seller">Seller</option>
                <option value="customer">Customer</option>
              </select>
            </div>

            <div class="form-row">
              <label for="password">Password</label>
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="new-password"
                required
              />
            </div>

            <div class="form-row">
              <label for="confirm-password">Confirm Password</label>
              <input
                id="confirm-password"
                name="confirmPassword"
                type="password"
                autocomplete="new-password"
                required
              />
            </div>

            <p id="signupMessage" class="auth-footer-text auth-status-text" hidden aria-live="polite"></p>

            <button id="signupBtn" type="submit" class="btn btn-primary">Create Account</button>

            <div class="auth-divider" role="separator" aria-label="Social sign up options">
              <span>or continue with</span>
            </div>

            <div class="social-login">
              <button type="button" class="btn" aria-label="Continue with Google">Google</button>
              <button type="button" class="btn" aria-label="Continue with Apple">Apple</button>
            </div>

            <p class="auth-footer-text">
              Already have an account? <a href="login.html">Sign in</a>
            </p>
          </form>
        </section>
      </div>
    </main>
    <script src="js/role.js"></script>
    <script src="js/script.js"></script>
    <script type="module" src="js/signup.js"></script>
    
  </body>
</html>
